<?xml version="1.0" encoding="UTF-8"?>
<!--
  REAVE brand gradient — color stops sampled from public/logo.png.
  Full-bleed fill without REAVE letter cutouts.
  ViewBox matches logo.png (1014×329); gradient span aligns to opaque artwork (x 56–956).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1014" height="329" viewBox="0 0 1014 329" role="img" aria-label="REAVE brand gradient">
  <defs>
    <linearGradient id="reave-sweep" gradientUnits="userSpaceOnUse" x1="56" y1="164.5" x2="956" y2="164.5">
      <stop offset="0%" stop-color="#b977e8" />
      <stop offset="6%" stop-color="#d969ce" />
      <stop offset="12%" stop-color="#de59f1" />
      <stop offset="20%" stop-color="#e342fe" />
      <stop offset="28%" stop-color="#db4dfe" />
      <stop offset="36%" stop-color="#d04cfe" />
      <stop offset="44%" stop-color="#c948fe" />
      <stop offset="52%" stop-color="#df27fc" />
      <stop offset="60%" stop-color="#e420f9" />
      <stop offset="68%" stop-color="#f806ff" />
      <stop offset="76%" stop-color="#fe00b8" />
      <stop offset="84%" stop-color="#f110a9" />
      <stop offset="92%" stop-color="#d8339c" />
      <stop offset="100%" stop-color="#ce4b7f" />
    </linearGradient>

    <linearGradient id="reave-lift" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ddd4ff" stop-opacity="0.16" />
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ff5c8a" stop-opacity="0.12" />
    </linearGradient>

    <radialGradient id="reave-glow-left" cx="12%" cy="34%" r="44%">
      <stop offset="0%" stop-color="#c4a8ff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#c4a8ff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="reave-glow-mid" cx="54%" cy="40%" r="46%">
      <stop offset="0%" stop-color="#ff00e5" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff00e5" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="reave-glow-right" cx="88%" cy="64%" r="40%">
      <stop offset="0%" stop-color="#ff7090" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#ff7090" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1014" height="329" fill="url(#reave-sweep)" />
  <rect width="1014" height="329" fill="url(#reave-lift)" />
  <rect width="1014" height="329" fill="url(#reave-glow-left)" />
  <rect width="1014" height="329" fill="url(#reave-glow-mid)" />
  <rect width="1014" height="329" fill="url(#reave-glow-right)" />
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!-- REAVE brand cloud fill — matches src/styles/brand.css + LogoResolveShader. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1014" height="329" viewBox="0 0 1014 329">
  <defs>
    <linearGradient id="brand-sweep" gradientUnits="userSpaceOnUse" x1="80" y1="300" x2="920" y2="40">
      <stop offset="0%" stop-color="#f472b6"></stop>
      <stop offset="52%" stop-color="#c026d3"></stop>
      <stop offset="100%" stop-color="#6366f1"></stop>
    </linearGradient>

    <radialGradient id="cloud-indigo" gradientUnits="objectBoundingBox" cx="0.17" cy="0.53" r="0.55" gradientTransform="matrix(2.35 0 0 0.42 0 0)">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.72"></stop>
      <stop offset="42%" stop-color="#6366f1" stop-opacity="0.38"></stop>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="cloud-magenta" gradientUnits="objectBoundingBox" cx="0.39" cy="0.47" r="0.58" gradientTransform="matrix(2.15 0 0 0.45 0 0)">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.78"></stop>
      <stop offset="38%" stop-color="#c026d3" stop-opacity="0.42"></stop>
      <stop offset="100%" stop-color="#a21caf" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="cloud-pink" gradientUnits="objectBoundingBox" cx="0.60" cy="0.52" r="0.56" gradientTransform="matrix(2.25 0 0 0.4 0 0)">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.82"></stop>
      <stop offset="40%" stop-color="#ec4899" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="cloud-rose" gradientUnits="objectBoundingBox" cx="0.81" cy="0.49" r="0.52" gradientTransform="matrix(2.05 0 0 0.38 0 0)">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.7"></stop>
      <stop offset="45%" stop-color="#f472b6" stop-opacity="0.36"></stop>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="cloud-mist" gradientUnits="objectBoundingBox" cx="0.5" cy="0.55" r="0.7" gradientTransform="matrix(2.75 0 0 0.35 0 0)">
      <stop offset="0%" stop-color="#fce7f3" stop-opacity="0.28"></stop>
      <stop offset="55%" stop-color="#fbcfe8" stop-opacity="0.12"></stop>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="cloud-blur" x="-0.35" y="-0.8" width="1.7" height="2.6" filterUnits="objectBoundingBox">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"></feGaussianBlur>
    </filter>

    <filter id="cloud-soft" x="-0.25" y="-0.6" width="1.5" height="2.2" filterUnits="objectBoundingBox">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"></feGaussianBlur>
    </filter>
  </defs>

  <rect width="1014" height="329" fill="url(#brand-sweep)"></rect>
  <rect width="1014" height="329" fill="url(#cloud-indigo)"></rect>
  <rect width="1014" height="329" fill="url(#cloud-magenta)"></rect>
  <rect width="1014" height="329" fill="url(#cloud-pink)"></rect>
  <rect width="1014" height="329" fill="url(#cloud-rose)"></rect>
  <rect width="1014" height="329" fill="url(#cloud-mist)"></rect>

  <g filter="url(#cloud-blur)">
    <path
      d="M-40,148 C120,108 240,188 380,138 S620,98 760,158 S940,208 1060,148 L1060,198 C920,238 760,178 600,218 S280,248 80,188 Z"
      fill="#6366f1"
      opacity="0.36"
    ></path>
    <path
      d="M-20,178 C180,218 320,148 500,198 S760,228 920,168 S1020,138 1040,188 L1040,228 C860,258 680,198 480,238 S160,268 -20,218 Z"
      fill="#c026d3"
      opacity="0.34"
    ></path>
    <path
      d="M60,132 C220,92 400,162 560,112 S820,82 980,142 L980,172 C820,202 640,152 460,192 S200,212 60,162 Z"
      fill="#f472b6"
      opacity="0.30"
    ></path>
  </g>

  <g filter="url(#cloud-soft)">
    <ellipse cx="210" cy="164" rx="168" ry="46" fill="#818cf8" opacity="0.32"></ellipse>
    <ellipse cx="520" cy="158" rx="198" ry="52" fill="#c026d3" opacity="0.30"></ellipse>
    <ellipse cx="780" cy="170" rx="156" ry="44" fill="#f472b6" opacity="0.28"></ellipse>
    <ellipse cx="420" cy="176" rx="124" ry="36" fill="#fbcfe8" opacity="0.24"></ellipse>
    <ellipse cx="640" cy="162" rx="110" ry="32" fill="#d946ef" opacity="0.22"></ellipse>
  </g>
</svg>

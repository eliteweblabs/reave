<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" fill="none">
  <!-- UC seal mark (simplified circle + UC letterform) -->
  <circle cx="32" cy="36" r="26" stroke="#1a1a1a" stroke-width="3" fill="none"/>
  <circle cx="32" cy="36" r="20" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>
  <text x="32" y="42" font-family="'Times New Roman', Times, serif" font-size="20" font-weight="700" fill="#1a1a1a" text-anchor="middle">UC</text>
  <!-- Primary wordmark -->
  <text x="70" y="30" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="700" fill="#1a1a1a" text-anchor="start" letter-spacing="0.3">UC Law San Francisco</text>
  <!-- Subtitle -->
  <text x="70" y="50" font-family="Arial, Helvetica, sans-serif" font-size="9.5" fill="#333" letter-spacing="1.2" text-anchor="start">FORMERLY UC HASTINGS · EST. 1878</text>
